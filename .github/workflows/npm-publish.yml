name: Publish on NPM

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - '*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish --provenance --access public
