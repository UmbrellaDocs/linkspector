name: Publish on NPM

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - '*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npm publish --provenance --access public
