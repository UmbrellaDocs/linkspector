name: Build Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to upload binaries to'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset_name: linkspector-linux-x64
          - target: bun-linux-arm64
            asset_name: linkspector-linux-arm64
          - target: bun-darwin-x64
            asset_name: linkspector-macos-x64
          - target: bun-darwin-arm64
            asset_name: linkspector-macos-arm64
          - target: bun-windows-x64
            asset_name: linkspector-windows-x64.exe
            binary_name: linkspector.exe

    runs-on: ubuntu-latest
    name: Build ${{ matrix.asset_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun scripts/build-bun.mjs --target ${{ matrix.target }}

      - name: Rename binary for release asset
        run: |
          mv "dist/${{ matrix.binary_name || 'linkspector' }}" "dist/${{ matrix.asset_name }}"

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
